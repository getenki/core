name: CI-JS
env:
  DEBUG: napi:*
  BINARY_NAME: enki-ai
  MACOSX_DEPLOYMENT_TARGET: '10.13'
  CARGO_INCREMENTAL: '1'
'on':
  push:
    branches:
      - main
      - master
      - devops-release
    tags:
      - 'v*'
      - 'js-v*'
      - 'js/**'
    paths-ignore:
      - README.md
      - LICENSE
      - .gitignore
      - .editorconfig
      - docs/**
  pull_request: null
  workflow_dispatch: null
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    working-directory: crates/bindings/enki-js
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crates/bindings/enki-js/package-lock.json
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Remove unpublished optional native packages for CI
        run: npm pkg delete optionalDependencies
      - name: Install dependencies
        run: npm install
      - name: Oxlint
        run: npm run lint
      - name: Cargo fmt
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            build: npm run build -- --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc
          - host: windows-latest
            build: npm run build -- --target aarch64-pc-windows-msvc
            target: aarch64-pc-windows-msvc
          - host: macos-14
            build: npm run build -- --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - host: ubuntu-24.04
            build: npm run build -- --target x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            build: npm run build -- --target aarch64-unknown-linux-gnu
            target: aarch64-unknown-linux-gnu
    name: stable - ${{ matrix.settings.target }} - node@22
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crates/bindings/enki-js/package-lock.json
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        with:
          version: 0.14.1
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.settings.target, 'musl') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild
      - name: Setup toolchain
        run: ${{ matrix.settings.setup }}
        if: ${{ matrix.settings.setup }}
        shell: bash
      - name: Remove unpublished optional native packages for CI
        run: npm pkg delete optionalDependencies
      - name: Install dependencies
        run: npm install
      - name: Build
        run: ${{ matrix.settings.build }}
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            crates/bindings/enki-js/${{ env.BINARY_NAME }}.*.node
            crates/bindings/enki-js/${{ env.BINARY_NAME }}.*.wasm
          if-no-files-found: error
  test-bindings:
    name: Test bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x64
          - host: macos-14
            target: aarch64-apple-darwin
            architecture: arm64
          - host: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            architecture: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            architecture: arm64
        node:
          - '20'
          - '22'
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: crates/bindings/enki-js/package-lock.json
          architecture: ${{ matrix.settings.architecture }}
      - name: Backup package manifest
        run: cp package.json package.json.ci-backup
        shell: bash
      - name: Remove unpublished optional native packages for CI
        run: npm pkg delete optionalDependencies
      - name: Install dependencies
        run: npm install
      - name: Restore package manifest
        run: mv -f package.json.ci-backup package.json
        shell: bash
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/bindings/enki-js
      - name: List packages
        run: ls -R .
        shell: bash
      - name: Test bindings
        run: npm test
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    environment:
      name: npm-node
      url: https://www.npmjs.com/package/@getenki/ai
    permissions:
      contents: write
      id-token: write
    needs:
      - lint
      - test-bindings
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      GITHUB_REF_NAME: ${{ github.ref_name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm
          cache-dependency-path: crates/bindings/enki-js/package-lock.json

      - name: Backup package manifest
        run: cp package.json package.json.ci-backup
        shell: bash

      - name: Remove unpublished optional native packages for CI
        run: npm pkg delete optionalDependencies

      - name: Install dependencies
        run: npm install

      - name: Restore package manifest
        run: mv -f package.json.ci-backup package.json
        shell: bash

      - name: Create npm dirs
        run: npx napi create-npm-dirs

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: crates/bindings/enki-js/artifacts

      - name: Move artifacts
        run: npm run artifacts

      - name: Include README in release packages
        shell: bash
        run: |
          cp README.md npm/README.md

          for dir in npm/*/; do
            [ -d "$dir" ] || continue
            cp README.md "${dir}README.md"
          done

      - name: List packages
        run: ls -R ./npm
        shell: bash

      - name: Verify npm auth
        run: npm whoami

      - name: Prepare packages for npm publish
        run: npx napi prepublish -t npm --no-gh-release

      - name: Publish
        shell: bash
        run: |
          npm config set provenance true

          TAG="${GITHUB_REF_NAME#js-v}"
          TAG="${TAG#js/}"
          TAG="${TAG#v}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            npm publish --ignore-scripts --tag next --access public
          elif echo "${TAG}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            npm publish --ignore-scripts --access public
          elif echo "${TAG}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            npm publish --ignore-scripts --tag next --access public
          else
            echo "Tag ${GITHUB_REF_NAME} is not a publishable release, skipping publish"
          fi
