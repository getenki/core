name: CI-CLI

on:
  push:
    branches:
      - main
      - master
      - devops-release
    tags:
      - 'v*'
      - 'py-v*'
      - 'py/**'

permissions:
  contents: write

env:
  BINARY_NAME: enki
  RELEASE_ARTIFACT_DIR: release-artifacts

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_suffix: ""
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_suffix: ""
          - label: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""
          - label: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_suffix: ""
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_suffix: .exe

    steps:
      - uses: actions/checkout@v6

      - name: Extract release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#rs-v}"
          version="${version#v}"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cli-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cli-${{ runner.os }}-${{ matrix.target }}-
            cli-${{ runner.os }}-

      - name: Build CLI
        run: cargo build --locked --release -p enki-cli --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Package release archive
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $target = "${{ matrix.target }}"
          $binaryName = "${{ env.BINARY_NAME }}${{ matrix.binary_suffix }}"
          $packageName = "enki-cli-$version-$target"
          $stagingRoot = Join-Path $env:RUNNER_TEMP $packageName
          $assetDir = "${{ env.RELEASE_ARTIFACT_DIR }}"
          $assetName = "$packageName.${{ matrix.archive_ext }}"
          $assetPath = Join-Path $PWD $assetDir $assetName
          $builtBinary = Join-Path $PWD "target/$target/release/$binaryName"

          New-Item -ItemType Directory -Force -Path $stagingRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          Copy-Item $builtBinary $stagingRoot
          Copy-Item (Join-Path $PWD "README.md") $stagingRoot
          Copy-Item (Join-Path $PWD "LICENSE") $stagingRoot

          if ("${{ matrix.archive_ext }}" -eq "zip") {
            Compress-Archive -Path (Join-Path $stagingRoot "*") -DestinationPath $assetPath -Force
          } else {
            tar -C $env:RUNNER_TEMP -czf $assetPath $packageName
          }

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.RELEASE_ARTIFACT_DIR }}/*
          if-no-files-found: error

  release:
    name: Attach CLI assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Extract release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#rs-v}"
          version="${version#v}"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.RELEASE_ARTIFACT_DIR }}
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd "${RELEASE_ARTIFACT_DIR}"
          sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ env.RELEASE_ARTIFACT_DIR }}/*
