[[agent]]
capabilities = [
    "general",
    "writing",
    "analysis",
]
id = "assistant"
max_iterations = 20
model = "ollama::qwen3.5"
name = "Personal Assistant"
system_prompt = "You are a helpful personal assistant. Use Tools before answer"
tools = ["weather-tools"]

[project]
name = "my-app"
version = "0.1.0"

[[tool]]
id = "weather-tools"
kind = "python"
path = "src/tools/weather.py"
symbol = "weather_info"

[workspace]
home = "./.enki"
