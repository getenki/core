[[task]]
id = "research-topic"
capabilities = ["analysis"]
prompt = "Research this request and provide concise findings:\n{{input.message}}"
output_key = "result"

[[workflow]]
id = "research-flow"
name = "Research Flow"
failure_policy = "continue_best_effort"

[[workflow.node]]
id = "run"
kind = "task"
task = "research-topic"
